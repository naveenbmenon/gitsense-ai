<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a1033"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="60%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </radialGradient>
    <radialGradient id="fuchsiaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <circle cx="30" cy="28" r="22" fill="#6366f1" fill-opacity="0.08" filter="url(#softBlur)"/>
  <circle cx="72" cy="72" r="18" fill="#a855f7" fill-opacity="0.07" filter="url(#softBlur)"/>

  <!-- Rings -->
  <circle cx="50" cy="50" r="44" stroke="url(#ringGrad)" stroke-width="0.75" fill="none"/>
  <circle cx="50" cy="50" r="38" stroke="#6366f1" stroke-width="0.4" fill="none" stroke-opacity="0.15"/>

  <!-- Trunk line -->
  <line x1="42" y1="28" x2="42" y2="76" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- Branch curve -->
  <path d="M42 44 Q42 58 62 58" stroke="#818cf8" stroke-width="1.75" stroke-linecap="round" fill="none" stroke-opacity="0.7"/>

  <!-- Top node -->
  <circle cx="42" cy="28" r="6" fill="url(#coreGlow)" filter="url(#nodeGlow)"/>
  <circle cx="42" cy="28" r="2.5" fill="white" fill-opacity="0.95"/>

  <!-- Middle node -->
  <circle cx="42" cy="58" r="4.5" fill="#4f46e5" stroke="#818cf8" stroke-width="1" filter="url(#nodeGlow)"/>
  <circle cx="42" cy="58" r="1.5" fill="#a5b4fc" fill-opacity="0.9"/>

  <!-- Bottom node -->
  <circle cx="42" cy="76" r="4" fill="#3730a3" stroke="#6366f1" stroke-width="0.75"/>
  <circle cx="42" cy="76" r="1.5" fill="#818cf8" fill-opacity="0.8"/>

  <!-- Branch node fuchsia -->
  <circle cx="62" cy="58" r="5.5" fill="url(#fuchsiaGlow)" filter="url(#nodeGlow)"/>
  <circle cx="62" cy="58" r="2" fill="white" fill-opacity="0.9"/>

  <!-- Sparkles -->
  <circle cx="68" cy="26" r="1.2" fill="#a5b4fc" fill-opacity="0.6"/>
  <circle cx="74" cy="33" r="0.7" fill="#818cf8" fill-opacity="0.4"/>
  <circle cx="64" cy="19" r="0.8" fill="#c4b5fd" fill-opacity="0.5"/>
  <circle cx="24" cy="68" r="0.9" fill="#818cf8" fill-opacity="0.35"/>
  <circle cx="30" cy="78" r="0.6" fill="#a5b4fc" fill-opacity="0.3"/>
</svg>